<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokébox Solver</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0b0c10;
  --surface:  #13141a;
  --panel:    #1a1c25;
  --border:   #2a2d3a;
  --accent:   #c8ff00;
  --accent2:  #00e5ff;
  --accent3:  #ff4fd8;
  --text:     #e8eaf0;
  --muted:    #6b6f85;
  --good:     #39ff14;
  --warn:     #ffb300;
  --bad:      #ff4444;
  --radius:   6px;
  --font-ui:  'Silkscreen', monospace;
  --font-mono:'DM Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 13px;
  min-height: 100vh;
  overflow-x: hidden;
}

/* scanline overlay */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.07) 2px,
    rgba(0,0,0,0.07) 4px
  );
  pointer-events: none;
  z-index: 1000;
}

/* grid bg */
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(200,255,0,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(200,255,0,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

.app {
  position: relative;
  z-index: 1;
  max-width: 1100px;
  margin: 0 auto;
  padding: 24px 20px 60px;
}

/* ── Header ── */
header {
  display: flex;
  align-items: baseline;
  gap: 16px;
  margin-bottom: 32px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
header h1 {
  font-family: var(--font-ui);
  font-size: 22px;
  color: var(--accent);
  letter-spacing: 2px;
  text-shadow: 0 0 20px rgba(200,255,0,0.4);
}
header .sub {
  color: var(--muted);
  font-size: 11px;
  letter-spacing: 1px;
}
.blink { animation: blink 1s step-end infinite; }
@keyframes blink { 50% { opacity: 0; } }

/* ── Layout ── */
.layout {
  display: grid;
  grid-template-columns: 300px 1fr;
  gap: 16px;
  align-items: start;
}
@media (max-width: 720px) {
  .layout { grid-template-columns: 1fr; }
}

/* ── Panels ── */
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
}
.panel-title {
  font-family: var(--font-ui);
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--accent2);
  text-transform: uppercase;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.panel-title::before {
  content: '';
  display: inline-block;
  width: 6px; height: 6px;
  background: var(--accent2);
  border-radius: 50%;
  box-shadow: 0 0 6px var(--accent2);
}

/* ── Form Controls ── */
.field-group {
  margin-bottom: 14px;
}
label {
  display: block;
  font-size: 10px;
  letter-spacing: 1px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 5px;
}
select, input[type="number"] {
  width: 100%;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 13px;
  padding: 8px 10px;
  outline: none;
  appearance: none;
  transition: border-color 0.15s;
}
select:focus, input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(200,255,0,0.1);
}
select option { background: var(--panel); }

.checkbox-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
  cursor: pointer;
}
.checkbox-row input[type="checkbox"] {
  width: 16px; height: 16px;
  accent-color: var(--accent);
  cursor: pointer;
}
.checkbox-row span {
  font-size: 11px;
  color: var(--text);
  letter-spacing: 0.5px;
}

.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* ── Run Button ── */
#runBtn {
  width: 100%;
  margin-top: 6px;
  padding: 12px;
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: var(--radius);
  font-family: var(--font-ui);
  font-size: 12px;
  letter-spacing: 3px;
  cursor: pointer;
  transition: all 0.15s;
  text-transform: uppercase;
}
#runBtn:hover:not(:disabled) {
  background: #d8ff33;
  box-shadow: 0 0 20px rgba(200,255,0,0.4);
  transform: translateY(-1px);
}
#runBtn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

#stopBtn {
  width: 100%;
  margin-top: 6px;
  padding: 12px;
  background: var(--bad);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-family: var(--font-ui);
  font-size: 12px;
  letter-spacing: 3px;
  cursor: pointer;
  transition: all 0.15s;
  text-transform: uppercase;
}
#stopBtn:hover:not(:disabled) {
  background: #ff6666;
  box-shadow: 0 0 20px rgba(255,68,68,0.4);
  transform: translateY(-1px);
}
#stopBtn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

/* ── Right column ── */
.right-col { display: flex; flex-direction: column; gap: 16px; }

/* ── Progress ── */
#progress-section { display: none; }
.stat-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 14px;
}
.stat-box {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 12px;
  text-align: center;
}
.stat-box .val {
  font-family: var(--font-ui);
  font-size: 15px;
  color: var(--accent);
  display: block;
  margin-bottom: 3px;
}
.stat-box .lbl {
  font-size: 9px;
  letter-spacing: 1px;
  color: var(--muted);
  text-transform: uppercase;
}

/* progress bar */
.bar-track {
  height: 6px;
  background: var(--panel);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 12px;
  border: 1px solid var(--border);
}
#bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 3px;
  transition: width 0.3s ease;
  box-shadow: 0 0 8px rgba(200,255,0,0.4);
}

/* sparkline */
.sparkline-wrap {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px;
  margin-bottom: 12px;
}
#sparkline {
  width: 100%;
  height: 50px;
  display: block;
}
#sparkline-line {
  fill: none;
  stroke: var(--accent);
  stroke-width: 1.5;
  vector-effect: non-scaling-stroke;
}
#sparkline-area {
  fill: url(#spark-grad);
  opacity: 0.3;
}

/* log */
#log {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  height: 130px;
  overflow-y: auto;
  font-size: 11px;
  line-height: 1.7;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.log-info  { color: var(--muted); }
.log-good  { color: var(--good); }
.log-warn  { color: var(--warn); }
.log-bad   { color: var(--bad); }

/* ── Results ── */
#results-section { display: none; }
#final-score {
  font-family: var(--font-ui);
  font-size: 13px;
  color: var(--accent3);
  margin-bottom: 16px;
  letter-spacing: 2px;
}

.team-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 10px;
  margin-bottom: 20px;
}

.poke-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 10px;
  text-align: center;
  transition: border-color 0.15s, transform 0.15s;
  position: relative;
  overflow: hidden;
}
.poke-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(200,255,0,0.03), transparent);
  pointer-events: none;
}
.poke-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 4px 20px rgba(200,255,0,0.15);
}
.poke-sprite {
  width: 72px;
  height: 72px;
  image-rendering: pixelated;
}
.poke-no-sprite {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 72px; height: 72px;
  font-size: 28px;
  margin: 0 auto;
  color: var(--muted);
}
.poke-name {
  font-size: 11px;
  font-weight: 500;
  margin: 6px 0 3px;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.poke-meta {
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 0.5px;
  margin-bottom: 5px;
}
.poke-types {
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
  justify-content: center;
  margin-top: 5px;
}
.type-badge {
  font-size: 8px;
  font-family: var(--font-ui);
  letter-spacing: 0.5px;
  padding: 2px 5px;
  border-radius: 3px;
  text-transform: uppercase;
  font-weight: 700;
}
.poke-class-badge {
  font-size: 8px;
  font-family: var(--font-ui);
  padding: 2px 6px;
  border-radius: 3px;
  margin: 4px auto 0;
  display: inline-block;
  letter-spacing: 0.5px;
}
.poke-ip {
  font-size: 9px;
  color: var(--accent2);
  margin-top: 3px;
}
.poke-score {
  font-size: 9px;
  color: var(--accent);
  font-family: var(--font-ui);
  margin-top: 2px;
}

/* class badge colors */
.cls-legendary  { background: rgba(255,215,0,0.15); color: #ffd700; border: 1px solid rgba(255,215,0,0.3); }
.cls-mythical   { background: rgba(255,79,216,0.15); color: #ff4fd8; border: 1px solid rgba(255,79,216,0.3); }
.cls-ultra-beast{ background: rgba(0,229,255,0.15); color: #00e5ff; border: 1px solid rgba(0,229,255,0.3); }
.cls-baby       { background: rgba(255,182,193,0.15); color: #ffb6c1; border: 1px solid rgba(255,182,193,0.3); }
.cls-gigantamax { background: rgba(255,69,0,0.15); color: #ff4500; border: 1px solid rgba(255,69,0,0.3); }

/* type badge colors */
.tb-fire     { background:#b22222; color:#ffe4c4; }
.tb-water    { background:#1565c0; color:#bbdefb; }
.tb-grass    { background:#2e7d32; color:#c8e6c9; }
.tb-electric { background:#c6a800; color:#fff9c4; }
.tb-ice      { background:#00838f; color:#e0f7fa; }
.tb-fighting { background:#7b1c00; color:#ffccbc; }
.tb-poison   { background:#6a1b9a; color:#e1bee7; }
.tb-ground   { background:#8d6e36; color:#fff3e0; }
.tb-flying   { background:#1976d2; color:#e3f2fd; }
.tb-psychic  { background:#ad1457; color:#fce4ec; }
.tb-bug      { background:#558b2f; color:#f1f8e9; }
.tb-rock     { background:#6d4c41; color:#efebe9; }
.tb-ghost    { background:#4527a0; color:#ede7f6; }
.tb-dragon   { background:#1565c0; color:#bbdefb; }
.tb-dark     { background:#212121; color:#bdbdbd; }
.tb-steel    { background:#455a64; color:#eceff1; }
.tb-fairy    { background:#c2185b; color:#fce4ec; }
.tb-normal   { background:#546e7a; color:#eceff1; }
.tb-shadow   { background:#1a0030; color:#b39ddb; }
.tb-shining  { background:#1a1000; color:#fff9c4; }

/* appeal chart */
#chart-wrap {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
}
#chart-wrap h3 {
  font-family: var(--font-ui);
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--muted);
  margin-bottom: 12px;
}
.bar-chart { display: flex; flex-direction: column; gap: 5px; }
.bar-row { display: flex; align-items: center; gap: 8px; }
.bar-label {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  width: 70px;
  text-align: right;
  color: var(--muted);
  flex-shrink: 0;
}
.bar-fill-wrap {
  flex: 1;
  height: 16px;
  background: var(--surface);
  border-radius: 3px;
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.5s ease;
}
.bar-val {
  font-size: 9px;
  color: var(--muted);
  width: 32px;
  text-align: right;
  flex-shrink: 0;
}

/* ── Empty / idle state ── */
.idle-hint {
  padding: 40px 20px;
  text-align: center;
  color: var(--muted);
  font-size: 11px;
  letter-spacing: 1px;
  border: 1px dashed var(--border);
  border-radius: var(--radius);
}
.idle-hint .big { font-family: var(--font-ui); font-size: 32px; color: var(--border); display: block; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>POKÉBOX<span class="blink">_</span></h1>
    <span class="sub">TEAM SOLVER // ISLAND GA ENGINE</span>
  </header>

  <div class="layout">
    <!-- ── Left: Controls ── -->
    <div class="panel">
      <div class="panel-title">Configuration</div>

      <div class="field-group">
        <label>Field / Biome</label>
        <select id="field-select"></select>
      </div>

      <div class="field-group">
        <label>Evolution Stage Filter</label>
        <select id="evo_stage">
          <option value="">All stages</option>
          <option value="1">Stage 1 only</option>
          <option value="2">Stage 2 only</option>
          <option value="3">Stage 3 only</option>
        </select>
      </div>

      <div class="row2">
        <div class="field-group">
          <label>Team Size</label>
          <input type="number" id="limit" value="8" min="1" max="20">
        </div>
        <div class="field-group">
          <label>Generations</label>
          <input type="number" id="generations" value="150" min="10" max="1000">
        </div>
      </div>

      <div class="row2">
        <div class="field-group">
          <label>Pop Size</label>
          <input type="number" id="popsize" value="60" min="10" max="300">
        </div>
        <div class="field-group">
          <label>Islands</label>
          <input type="number" id="islands" value="3" min="1" max="6">
        </div>
      </div>

      <label class="checkbox-row">
        <input type="checkbox" id="exclude_hidden" checked>
        <span>Exclude hidden Pokémon</span>
      </label>

      <label class="checkbox-row">
        <input type="checkbox" id="exclude_shadow">
        <span>Exclude shadow / shining</span>
      </label>

      <button id="runBtn" onclick="startSolve()">▶ RUN SOLVER</button>
      <button id="stopBtn" onclick="stopSolve()" disabled style="display:none">■ STOP</button>
    </div>

    <!-- ── Right: Output ── -->
    <div class="right-col">
      <!-- Progress -->
      <div id="progress-section" class="panel">
        <div class="panel-title">Evolution Progress</div>
        <div class="stat-row">
          <div class="stat-box"><span class="val" id="gen-num">0</span><span class="lbl">Gen</span></div>
          <div class="stat-box"><span class="val" id="best-score">—</span><span class="lbl">Best</span></div>
          <div class="stat-box"><span class="val" id="pool-size">—</span><span class="lbl">Pool</span></div>
          <div class="stat-box"><span class="val" id="elapsed">0s</span><span class="lbl">Time</span></div>
        </div>
        <div class="stat-row" id="metrics-row" style="display:none">
          <div class="stat-box"><span class="val" id="seeds-eval">0</span><span class="lbl">Evaluated</span></div>
          <div class="stat-box"><span class="val" id="cache-hit">0%</span><span class="lbl">Cache Hit</span></div>
          <div class="stat-box"><span class="val" id="pruned-cnt">0</span><span class="lbl">Pruned</span></div>
          <div class="stat-box"><span class="val" id="stagnant-cnt">0</span><span class="lbl">Stagnant</span></div>
        </div>
        <div class="bar-track"><div id="bar"></div></div>
        <div class="sparkline-wrap">
          <svg id="sparkline" viewBox="0 0 300 50" preserveAspectRatio="none">
            <defs>
              <linearGradient id="spark-grad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#c8ff00"/>
                <stop offset="100%" stop-color="#c8ff00" stop-opacity="0"/>
              </linearGradient>
            </defs>
            <polygon id="sparkline-area" points=""/>
            <polyline id="sparkline-line" points=""/>
          </svg>
        </div>
        <div id="log"></div>
      </div>

      <!-- Results -->
      <div id="results-section" class="panel">
        <div class="panel-title">Best Team</div>
        <div id="final-score"></div>
        <div class="team-grid" id="team-grid"></div>
        <div id="chart-wrap" style="display:none">
          <h3>TYPE APPEAL BREAKDOWN</h3>
          <div class="bar-chart" id="appeal-chart"></div>
        </div>
      </div>

      <!-- Idle -->
      <div id="idle-hint" class="idle-hint">
        <span class="big">◈</span>
        Select a field and hit RUN SOLVER to evolve your team
      </div>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script src="seedcache.js"></script>
<script src="appealcache.js"></script>
<script src="appealsearch.js"></script>
<script src="symmetry.js"></script>
<script src="heuristics.js"></script>
<script src="mcts.js"></script>
<script>

// ── Field Definitions ──────────────────────────────────────────────────────
const FIELDS = [
  {token:"forest",     name:"Forest",     baseTypes:["grass","bug","fairy"]},
  {token:"savanna",    name:"Savanna",    baseTypes:["normal","electric"]},
  {token:"desert",     name:"Desert",     baseTypes:["ground","grass","fire"]},
  {token:"beach",      name:"Beach",      baseTypes:["water","ground","flying"]},
  {token:"river",      name:"River",      baseTypes:["water","grass","bug"]},
  {token:"seafloor",   name:"Seafloor",   baseTypes:["water"]},
  {token:"cave",       name:"Cave",       baseTypes:["ground","poison","rock"]},
  {token:"crag",       name:"Crag",       baseTypes:["poison","fire","dark"]},
  {token:"volcano",    name:"Volcano",    baseTypes:["fire","rock"]},
  {token:"tundra",     name:"Tundra",     baseTypes:["ice","water"]},
  {token:"city",       name:"City",       baseTypes:["poison","normal","fighting"]},
  {token:"sky",        name:"Sky",        baseTypes:["flying","dragon"]},
  {token:"space",      name:"Space",      baseTypes:["psychic","dragon"]},
  {token:"graveyard",  name:"Graveyard",  baseTypes:["ghost","dark","poison","grass"]},
  {token:"factory",    name:"Factory",    baseTypes:["electric","steel"]},
  {token:"cliffside",  name:"Cliffside",  baseTypes:["rock","ground","dragon"]},
  {token:"dojo",       name:"Dojo",       baseTypes:["fighting"]},
  {token:"dreamscape", name:"Dreamscape", baseTypes:["fairy","psychic"]},
  {token:"temple",     name:"Temple",     baseTypes:["dragon","flying"]},
];
const FIELDS_INDEX = Object.fromEntries(FIELDS.map(f => [f.token, f]));

// ── GA Engine ─────────────────────────────────────────────────────────────
const DEFAULT_MUT_RATE = 0.15;
const MIGRATION_FREQ   = 10;

function adaptiveMutRate(gen, maxGens, base = DEFAULT_MUT_RATE) {
  const t = gen / maxGens;
  return base * (0.5 + 0.5 * (1 - t));
}

function tournamentSelect(pop, scores, k = 4) {
  k = Math.min(k, pop.length);
  let best = null, bestScore = -Infinity;
  const used = new Set();
  while (used.size < k) {
    const i = Math.floor(Math.random() * pop.length);
    if (used.has(i)) continue;
    used.add(i);
    if (scores[i] > bestScore) { bestScore = scores[i]; best = pop[i]; }
  }
  return best;
}

function crossover(a, b, pool) {
  const cut = 1 + Math.floor(Math.random() * (a.length - 1));
  const headSet = new Set(a.slice(0, cut));
  const child = [...a.slice(0, cut)];
  for (const g of b) if (!headSet.has(g)) child.push(g);
  if (child.length < a.length) {
    const childSet = new Set(child);
    const remaining = pool.filter(g => !childSet.has(g));
    shuffle(remaining);
    child.push(...remaining.slice(0, a.length - child.length));
  }
  return child.slice(0, a.length);
}

function mutate(team, pool, rate) {
  team = [...team];
  let teamSet = new Set(team);  // O(1) membership checks
  for (let i = 0; i < team.length; i++) {
    if (Math.random() < rate) {
      const candidates = pool.filter(g => !teamSet.has(g));
      if (candidates.length) {
        teamSet.delete(team[i]);
        team[i] = candidates[Math.floor(Math.random() * candidates.length)];
        teamSet.add(team[i]);
      }
    }
  }
  return team;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function sampleWithout(pool, n) {
  const copy = [...pool]; shuffle(copy);
  return copy.slice(0, Math.min(n, copy.length));
}

// ── Fitness Function ───────────────────────────────────────────────────────
// Score a team against field base types.
// Each Pokémon contributes for each of its types that matches a target type.
// Diversity bonus: penalise repeated type coverage.
// Species effects applied: ignoreTypeWeaknesses, reverseTypeAppeal, repelAllVisitors, increaseSpecialVisitors
function fitnessScore(team, targets) {
  const targetSet = new Set(targets);
  let score = 0;
  const typeCoverage = {};

  for (const token of team) {
    const p = DB[token];
    if (!p) continue;

    // Use per-Pokémon appeal cache when available (avoids recomputing effects)
    if (typeof _appealCache !== 'undefined' && _appealCache) {
      const cached = _appealCache.getTokenContribution(token, targets);
      if (cached !== null) {
        score += cached.contrib;
        for (const t of cached.coveredTypes) {
          typeCoverage[t] = (typeCoverage[t] || 0) + 1;
        }
        continue;
      }
    }

    const effects = p.se || [];

    // repelAllVisitors → heavy penalty
    if (effects.includes('repelAllVisitors')) { score -= 5; continue; }

    // life_points override
    if (p.lp === -1) { score -= 3; continue; }  // infinite drain
    if (p.lp !== null && p.lp !== undefined) { score += p.lp / 100; }

    const types = p.t || [];
    let contrib = 0;

    if (effects.includes('reverseTypeAppeal')) {
      // contributes for types NOT in targets
      for (const t of types) {
        if (!targetSet.has(t)) contrib += 1;
      }
    } else {
      for (const t of types) {
        if (targetSet.has(t)) {
          contrib += 1;
          typeCoverage[t] = (typeCoverage[t] || 0) + 1;
        }
      }
    }

    if (effects.includes('increaseSpecialVisitors')) contrib *= 1.5;
    score += contrib;
  }

  // Diversity bonus: reward spreading coverage across target types
  let diversityBonus = 0;
  for (const t of targets) {
    if (typeCoverage[t]) diversityBonus += Math.min(typeCoverage[t], 2) * 0.3;
  }
  score += diversityBonus;

  return score;
}

// ── Appeal Chart Data ──────────────────────────────────────────────────────
function appealChartData(team, targets) {
  const targetSet = new Set(targets);
  const typeScores = {};
  for (const t of targets) typeScores[t] = 0;

  for (const token of team) {
    const p = DB[token]; if (!p) continue;
    const effects = p.se || [];
    if (effects.includes('repelAllVisitors')) continue;
    for (const t of (p.t || [])) {
      if (targetSet.has(t)) typeScores[t] = (typeScores[t] || 0) + 1;
    }
  }
  const labels = Object.keys(typeScores);
  const values = labels.map(l => typeScores[l]);
  return { labels, values };
}

// ── Sprite URL ─────────────────────────────────────────────────────────────
function spriteUrl(token) {
  const p = DB[token]; if (!p) return null;
  const dex = p.d;
  if (!dex || typeof dex !== 'number' || dex > 1000) return null;
  return `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${Math.floor(dex)}.png`;
}

// ── State ──────────────────────────────────────────────────────────────────
let gaWorkerTimer = null;
let scoreHistory  = [];
let startTime     = 0;
let timerID       = null;
let gaRunning     = false;
let gaGen         = 0;
let gaStopped     = false;
let gaState       = null; // { islands, bestTeam, bestScore, maxGens, pool, targets, teamSize, popSize, numIslands }

// ── Optimization objects (created fresh each run) ─────────────────────────
let _seedCache    = null; // SeedEvaluationCache  – caches full team scores
let _appealCache  = null; // AppealEffectsCache   – caches per-Pokémon contributions
let _pruner       = null; // AppealPruner         – skips duplicate appeal vectors
let _symCache     = null; // SymmetryCache        – skips order-equivalent teams

// ── Run-level metrics ─────────────────────────────────────────────────────
let _metrics = {
  seedsEvaluated: 0, // full fitnessScore calls made
  pruned:         0, // seeds skipped by appeal pruner
  stagnantGens:   0, // consecutive gens with no improvement
};

// ── Init UI ────────────────────────────────────────────────────────────────
// ── localStorage helpers ───────────────────────────────────────────────────
const LS_SETTINGS = 'pokebox_settings';
const LS_RESULTS  = 'pokebox_results';

function saveSettings() {
  const settings = {
    field:    document.getElementById('field-select').value,
    limit:    document.getElementById('limit').value,
    gens:     document.getElementById('generations').value,
    popsize:  document.getElementById('popsize').value,
    islands:  document.getElementById('islands').value,
    excHidden:  document.getElementById('exclude_hidden').checked,
    excShadow:  document.getElementById('exclude_shadow').checked,
    evoStage:   document.getElementById('evo_stage').value,
  };
  try { localStorage.setItem(LS_SETTINGS, JSON.stringify(settings)); } catch (_) {}
}

function restoreSettings() {
  try {
    const raw = localStorage.getItem(LS_SETTINGS);
    if (!raw) return;
    const s = JSON.parse(raw);
    if (s.field)    document.getElementById('field-select').value = s.field;
    if (s.limit)    document.getElementById('limit').value = s.limit;
    if (s.gens)     document.getElementById('generations').value = s.gens;
    if (s.popsize)  document.getElementById('popsize').value = s.popsize;
    if (s.islands)  document.getElementById('islands').value = s.islands;
    if (s.excHidden !== undefined) document.getElementById('exclude_hidden').checked = s.excHidden;
    if (s.excShadow !== undefined) document.getElementById('exclude_shadow').checked = s.excShadow;
    if (s.evoStage) document.getElementById('evo_stage').value = s.evoStage;
  } catch (_) {}
}

function saveResults(team, score, targets) {
  try {
    localStorage.setItem(LS_RESULTS, JSON.stringify({ team, score, targets }));
  } catch (_) {}
}

function restoreResults() {
  try {
    const raw = localStorage.getItem(LS_RESULTS);
    if (!raw) return;
    const { team, score, targets } = JSON.parse(raw);
    if (team && score != null && targets) {
      renderResults(team, score, targets);
      addLog('Restored previous results from session.', 'info');
    }
  } catch (_) {}
}

function initUI() {
  const sel = document.getElementById('field-select');
  FIELDS.forEach(f => {
    const opt = document.createElement('option');
    opt.value = f.token;
    opt.textContent = `${f.name} — [${f.baseTypes.join(', ')}]`;
    sel.appendChild(opt);
  });

  restoreSettings();
  restoreResults();

  // Keyboard shortcuts: Enter → run, Escape → stop
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
    if (e.key === 'Enter' && !gaRunning) startSolve();
    if (e.key === 'Escape' && gaRunning) stopSolve();
  });
}

// ── Solve ──────────────────────────────────────────────────────────────────
function buildPool() {
  const excludeHidden  = document.getElementById('exclude_hidden').checked;
  const excludeShadow  = document.getElementById('exclude_shadow').checked;
  const evoStageFilter = document.getElementById('evo_stage').value;

  return TOKEN_LIST.filter(token => {
    const p = DB[token]; if (!p) return false;
    if (excludeHidden && p.h) return false;
    if (excludeShadow && p.t && (p.t.includes('shadow') || p.t.includes('shining'))) return false;
    if (evoStageFilter && String(p.e) !== evoStageFilter) return false;
    return true;
  });
}

function startSolve() {
  if (gaRunning) return;

  const teamSize   = Math.max(1, parseInt(document.getElementById('limit').value)       || 8);
  const maxGens    = Math.max(1, parseInt(document.getElementById('generations').value)  || 150);
  const popSize    = Math.max(2, parseInt(document.getElementById('popsize').value)      || 60);
  const numIslands = Math.max(1, parseInt(document.getElementById('islands').value)      || 3);

  // Validate numeric inputs
  if (!Number.isFinite(teamSize) || teamSize < 1) {
    addLog('Team size must be a positive number.', 'warn'); return;
  }
  if (!Number.isFinite(maxGens) || maxGens < 1) {
    addLog('Generations must be a positive number.', 'warn'); return;
  }
  if (!Number.isFinite(popSize) || popSize < 2) {
    addLog('Population size must be at least 2.', 'warn'); return;
  }
  if (!Number.isFinite(numIslands) || numIslands < 1) {
    addLog('Islands must be a positive number.', 'warn'); return;
  }

  saveSettings();

  // Reset
  if (timerID) clearInterval(timerID);
  if (gaWorkerTimer) clearTimeout(gaWorkerTimer);
  scoreHistory = [];
  gaRunning    = true;
  gaStopped    = false;

  // Initialise / reset optimisation objects
  _seedCache   = new SeedEvaluationCache();
  _appealCache = new AppealEffectsCache();
  _pruner      = new AppealPruner();
  _symCache    = new SymmetryCache();
  _metrics     = { seedsEvaluated: 0, pruned: 0, stagnantGens: 0 };

  document.getElementById('idle-hint').style.display    = 'none';
  document.getElementById('progress-section').style.display = 'block';
  document.getElementById('results-section').style.display  = 'none';
  document.getElementById('metrics-row').style.display      = 'grid';
  document.getElementById('log').innerHTML = '';
  document.getElementById('runBtn').disabled = true;
  document.getElementById('stopBtn').disabled = false;
  document.getElementById('stopBtn').style.display = 'block';
  document.getElementById('bar').style.width = '0%';
  document.getElementById('gen-num').textContent    = '0';
  document.getElementById('best-score').textContent = '—';
  document.getElementById('elapsed').textContent    = '0s';
  document.getElementById('seeds-eval').textContent = '0';
  document.getElementById('cache-hit').textContent  = '0%';
  document.getElementById('pruned-cnt').textContent = '0';
  document.getElementById('stagnant-cnt').textContent = '0';
  document.getElementById('sparkline-line').setAttribute('points', '');
  document.getElementById('sparkline-area').setAttribute('points', '');

  const fieldToken = document.getElementById('field-select').value;
  const field      = FIELDS_INDEX[fieldToken];
  const targets    = field.baseTypes;

  const pool = buildPool();
  addLog(`Field: ${field.name} [${targets.join(', ')}]`, 'info');
  addLog(`Pool: ${pool.length} Pokémon | Team size: ${teamSize}`, 'info');
  addLog(`Islands: ${numIslands} | Pop: ${popSize} | Gens: ${maxGens}`, 'info');
  document.getElementById('pool-size').textContent = pool.length;

  if (pool.length < teamSize) {
    addLog(`Pool too small (${pool.length} < ${teamSize}). Relax filters.`, 'warn');
    finishSolve(null, null, targets);
    return;
  }

  gaGen = 0;

  // Init islands
  const islands = Array.from({length: numIslands}, () =>
    Array.from({length: popSize}, () => sampleWithout(pool, teamSize))
  );
  gaState = { islands, bestTeam: null, bestScore: -Infinity, maxGens, pool, targets, teamSize, popSize, numIslands,
              prevBestScore: -Infinity };

  startTime = Date.now();
  timerID = setInterval(() => {
    document.getElementById('elapsed').textContent =
      ((Date.now() - startTime) / 1000).toFixed(1) + 's';
  }, 200);

  // Run GA in chunked async loop to keep UI responsive
  runGAChunk();
}

const CHUNK_SIZE = 5; // generations per chunk before yielding to UI

// Number of generations without improvement before declaring early stop.
const STAGNATION_LIMIT = 25;
// MCTS iterations run on the best seed at the end of each GA chunk.
const MCTS_ITERATIONS  = 30;

function _evaluateSeed(team, targets) {
  // 1. Symmetry / order-invariant cache: skip if exact team evaluated before.
  if (_symCache) {
    const cached = _symCache.get(team);
    if (cached !== undefined) return cached;
  }

  // 2. Appeal-space pruning: skip teams with a type distribution seen before.
  if (_pruner) {
    const sig = _pruner.getAppealSignature(team);
    if (_pruner.seenAppealVectors.has(sig)) {
      _metrics.pruned++;
      // Return representative seed's score when cached, otherwise evaluate.
      const rep = _pruner.seenAppealVectors.get(sig);
      if (rep && _symCache) {
        const repScore = _symCache.get(rep);
        if (repScore !== undefined) return repScore;
      }
      // Representative not cached yet – fall through to evaluate this team.
    } else {
      _pruner.seenAppealVectors.set(sig, team);
    }
  }

  // 3. Heuristic pre-filter: skip obviously bad seeds without full evaluation.
  if (typeAffinityScore(team, targets) < HEURISTIC_THRESHOLD) {
    // Cache the rejection so the same team is skipped instantly on re-encounter.
    const penaltyScore = -Infinity;
    if (_symCache) _symCache.set(team, penaltyScore);
    return penaltyScore;
  }

  // 4. Full evaluation (uses _appealCache internally via fitnessScore).
  _metrics.seedsEvaluated++;
  const score = fitnessScore(team, targets);
  if (_symCache) _symCache.set(team, score);
  if (_seedCache) _seedCache.set(team, score);
  return score;
}

function runGAChunk() {
  if (gaStopped) return;
  const { islands, pool, targets, teamSize, popSize, numIslands, maxGens } = gaState;
  const chunkEnd = Math.min(gaGen + CHUNK_SIZE, maxGens);

  for (; gaGen < chunkEnd; gaGen++) {
    const gen = gaGen + 1;
    const mutRate = adaptiveMutRate(gen, maxGens);

    for (let idx = 0; idx < numIslands; idx++) {
      const pop    = islands[idx];
      const scores = pop.map(t => _evaluateSeed(t, targets));

      // Track best
      let bestIdx = 0;
      for (let i = 1; i < scores.length; i++) {
        if (scores[i] > scores[bestIdx]) bestIdx = i;
      }
      if (scores[bestIdx] > gaState.bestScore) {
        gaState.bestScore = scores[bestIdx];
        gaState.bestTeam  = [...pop[bestIdx]];
      }

      // Next generation
      const nextPop = [];
      while (nextPop.length < popSize) {
        const pa = tournamentSelect(pop, scores);
        const pb = tournamentSelect(pop, scores);
        let child = crossover(pa, pb, pool);
        child = mutate(child, pool, mutRate);
        nextPop.push(child);
      }
      islands[idx] = nextPop;
    }

    // Migration
    if (gen % MIGRATION_FREQ === 0) {
      const migrants = islands.map(isl => isl[Math.floor(Math.random() * isl.length)]);
      for (let i = 0; i < numIslands; i++) {
        const dest = (i + 1) % numIslands;
        const replaceIdx = Math.floor(Math.random() * islands[dest].length);
        islands[dest][replaceIdx] = migrants[i];
      }
    }
  }

  // ── MCTS refinement of the current best seed ────────────────────────────
  if (gaState.bestTeam && pool.length > teamSize) {
    // Pass _evaluateSeed so MCTS shares the same caching/pruning pipeline.
    const mcts     = new SeedMCTS(gaState.bestTeam, targets, pool,
                                   (seed) => _evaluateSeed(seed, targets));
    const improved  = mcts.search(MCTS_ITERATIONS);
    const mctsScore = _evaluateSeed(improved, targets);
    if (Number.isFinite(mctsScore) && mctsScore > gaState.bestScore) {
      gaState.bestScore = mctsScore;
      gaState.bestTeam  = improved;
    }
  }

  // ── Early-stopping: stagnation detection ────────────────────────────────
  if (gaState.bestScore > gaState.prevBestScore) {
    // Genuine improvement this chunk – reset stagnation counter.
    _metrics.stagnantGens = 0;
    gaState.prevBestScore = gaState.bestScore;
  } else {
    // No improvement – increment stagnation counter.
    _metrics.stagnantGens++;
  }
  const earlyStop = _metrics.stagnantGens >= STAGNATION_LIMIT;

  // ── Update UI ────────────────────────────────────────────────────────────
  const pct = Math.round((gaGen / maxGens) * 100);
  document.getElementById('bar').style.width        = pct + '%';
  document.getElementById('gen-num').textContent    = gaGen;
  document.getElementById('best-score').textContent = gaState.bestScore.toFixed(2);
  scoreHistory.push(gaState.bestScore);
  updateSparkline();

  // Metrics row
  document.getElementById('seeds-eval').textContent = _metrics.seedsEvaluated;
  const totalCacheQueries = (_symCache ? _symCache.total : 0);
  const totalCacheHits    = (_symCache ? _symCache.hits  : 0);
  const hitPct = totalCacheQueries > 0
    ? Math.round((totalCacheHits / totalCacheQueries) * 100) + '%'
    : '0%';
  document.getElementById('cache-hit').textContent     = hitPct;
  document.getElementById('pruned-cnt').textContent    = _metrics.pruned;
  document.getElementById('stagnant-cnt').textContent  = _metrics.stagnantGens;

  if (earlyStop) {
    addLog(`⚡ Early stop at gen ${gaGen}: no improvement for ${STAGNATION_LIMIT} generations.`, 'warn');
    addLog(`✓ Complete! Best fitness: ${gaState.bestScore.toFixed(2)}`, 'good');
    finishSolve(gaState.bestTeam, gaState.bestScore, gaState.targets);
  } else if (gaGen < maxGens) {
    gaWorkerTimer = setTimeout(runGAChunk, 0);
  } else {
    addLog(`✓ Complete! Best fitness: ${gaState.bestScore.toFixed(2)}`, 'good');
    finishSolve(gaState.bestTeam, gaState.bestScore, gaState.targets);
  }
}

function stopSolve() {
  if (!gaRunning) return;
  gaStopped = true;
  if (gaWorkerTimer) clearTimeout(gaWorkerTimer);
  addLog('Stopped by user.', 'warn');
  if (gaState && gaState.bestTeam) {
    addLog(`Best result so far: fitness ${gaState.bestScore.toFixed(2)}`, 'info');
    finishSolve(gaState.bestTeam, gaState.bestScore, gaState.targets);
  } else {
    finishSolve(null, null, null);
  }
}

function finishSolve(team, score, targets) {
  clearInterval(timerID);
  gaRunning = false;
  document.getElementById('runBtn').disabled = false;
  document.getElementById('stopBtn').disabled = true;
  document.getElementById('stopBtn').style.display = 'none';
  document.getElementById('bar').style.width  = '100%';

  if (!team) return;
  renderResults(team, score, targets);
  saveResults(team, score, targets);
}

// ── Render Results ─────────────────────────────────────────────────────────
function renderResults(team, score, targets) {
  document.getElementById('results-section').style.display = 'block';
  document.getElementById('final-score').textContent =
    `FITNESS ${score.toFixed(2)}  //  ${team.length} POKÉMON  //  FIELD MATCH`;

  const grid = document.getElementById('team-grid');
  grid.innerHTML = '';

  team.forEach(token => {
    const p    = DB[token] || {};
    const types = p.t || [];
    const badges = types.map(t =>
      `<span class="type-badge tb-${t}">${t}</span>`
    ).join('');

    const spr = spriteUrl(token);
    const imgEl = spr
      ? `<img class="poke-sprite" src="${spr}" alt="${p.n || token}"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        + `<span class="poke-no-sprite" style="display:none">?</span>`
      : `<span class="poke-no-sprite">◈</span>`;

    const meta = [
      p.e ? `S${p.e}` : null,
      p.g ? `G${p.g}` : null,
      p.r ? p.r       : null,
    ].filter(Boolean).join(' · ');

    const cls = p.c || '';
    const clsBadge = cls
      ? `<div><span class="poke-class-badge cls-${cls}">${cls.replace(/-/g,' ')}</span></div>`
      : '';

    const ip = fitnessScore([token], targets);
    const ipEl = ip > 0
      ? `<div class="poke-score">↑ ${ip.toFixed(1)}</div>`
      : `<div class="poke-score muted">—</div>`;

    grid.innerHTML += `
      <div class="poke-card">
        ${imgEl}
        <div class="poke-name">${p.n || token}</div>
        <div class="poke-meta">${meta}</div>
        ${clsBadge}
        <div class="poke-types">${badges}</div>
        ${ipEl}
      </div>`;
  });

  // Appeal chart
  const chartData = appealChartData(team, targets);
  if (chartData.labels.length > 0) {
    renderAppealChart(chartData.labels, chartData.values);
  }
}

function renderAppealChart(labels, values) {
  const wrap = document.getElementById('chart-wrap');
  const chart = document.getElementById('appeal-chart');
  wrap.style.display = 'block';
  chart.innerHTML = '';
  const max = values.reduce((a, b) => Math.max(a, b), 1);
  const typeColors = {
    fire:'#b22222', water:'#1565c0', grass:'#2e7d32', electric:'#c6a800',
    ice:'#00838f', fighting:'#7b1c00', poison:'#6a1b9a', ground:'#8d6e36',
    flying:'#1976d2', psychic:'#ad1457', bug:'#558b2f', rock:'#6d4c41',
    ghost:'#4527a0', dragon:'#283593', dark:'#212121', steel:'#455a64',
    fairy:'#c2185b', normal:'#546e7a',
  };
  labels.forEach((lbl, i) => {
    const pct = Math.round((values[i] / max) * 100);
    const color = typeColors[lbl] || '#555';
    chart.innerHTML += `
      <div class="bar-row">
        <span class="bar-label">${lbl}</span>
        <div class="bar-fill-wrap">
          <div class="bar-fill" style="width:${pct}%; background:${color}"></div>
        </div>
        <span class="bar-val">${values[i]}</span>
      </div>`;
  });
}

// ── Sparkline ──────────────────────────────────────────────────────────────
function updateSparkline() {
  const h = scoreHistory;
  if (h.length < 2) return;
  const W = 300, H = 50, pad = 3;
  let minV = h[0], maxV = h[0];
  for (const v of h) { if (v < minV) minV = v; if (v > maxV) maxV = v; }
  const range = maxV - minV || 1;
  const pts = h.map((v, i) => {
    const x = (i / (h.length - 1)) * W;
    const y = H - pad - ((v - minV) / range) * (H - pad * 2);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  const lineStr  = pts.join(' ');
  const areaStr  = `0,${H} ` + lineStr + ` ${W},${H}`;
  document.getElementById('sparkline-line').setAttribute('points', lineStr);
  document.getElementById('sparkline-area').setAttribute('points', areaStr);
}

// ── Log ────────────────────────────────────────────────────────────────────
function addLog(text, kind = 'info') {
  const log = document.getElementById('log');
  const div = document.createElement('div');
  div.className = 'log-' + kind;
  div.textContent = '› ' + text;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

// ── Boot ───────────────────────────────────────────────────────────────────
initUI();
</script>
